name: Release Build (Platform)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      runner:
        required: true
        type: string
      rust-target:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: contains(inputs.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Building version: $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app
        run: npx tauri build --target ${{ inputs.rust-target }}

      - name: Upload to GitHub Release (macOS)
        if: contains(inputs.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ inputs.rust-target }}/release/bundle/dmg/*.dmg

      - name: Upload to GitHub Release (Windows)
        if: inputs.platform == 'windows-x64'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ inputs.rust-target }}/release/bundle/nsis/*.exe
            target/${{ inputs.rust-target }}/release/bundle/msi/*.msi

      - name: Upload to GitHub Release (Linux)
        if: inputs.platform == 'linux-x64'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ inputs.rust-target }}/release/bundle/deb/*.deb
            target/${{ inputs.rust-target }}/release/bundle/appimage/*.AppImage
