name: Build Tauri App

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            node_platform: darwin
            node_arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            node_platform: darwin
            node_arch: x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_platform: linux
            node_arch: x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_platform: win32
            node_arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          # Sync version into Tauri config and Cargo.toml
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json && rm -f tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml && rm -f Cargo.toml.bak
          echo "App version: $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TARGET_PLATFORM: ${{ matrix.node_platform }}
          TARGET_ARCH: ${{ matrix.node_arch }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "KlustrEye ${{ github.ref_name }}"
          releaseBody: "See the assets below to download the app for your platform."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
