name: RC Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - linux-x64
          - all
  pull_request:
    types: [labeled]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            node-platform: darwin
            node-arch: arm64
          - platform: macos-x64
            runner: macos-13
            rust-target: x86_64-apple-darwin
            node-platform: darwin
            node-arch: x64
          - platform: windows-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            node-platform: win32
            node-arch: x64
          - platform: linux-x64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            node-platform: linux
            node-arch: x64

    runs-on: ${{ matrix.runner }}

    # workflow_dispatch: respect the platform input
    # pull_request: run when matching "build:<platform>" or "build:all" label is added
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (inputs.platform == 'all' || inputs.platform == matrix.platform)) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.label.name, format('build:{0}', matrix.platform)) ||
         github.event.label.name == 'build:all'))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: contains(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Bundle server
        run: npm run server:bundle

      - name: Pack server (platform-specific Node.js)
        run: node scripts/pack-server.mjs
        env:
          TARGET_PLATFORM: ${{ matrix.node-platform }}
          TARGET_ARCH: ${{ matrix.node-arch }}

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust-target }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (macOS)
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
          retention-days: 14

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
          retention-days: 14

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
          retention-days: 14
