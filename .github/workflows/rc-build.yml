name: RC Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - linux-x64
          - all
  pull_request:
    types: [labeled]

permissions:
  contents: write

jobs:
  macos-arm64:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (inputs.platform == 'all' || inputs.platform == 'macos-arm64')) ||
      (github.event_name == 'pull_request' &&
        (github.event.label.name == 'build:macos-arm64' || github.event.label.name == 'build:all'))
    uses: ./.github/workflows/rc-build-platform.yml
    with:
      platform: macos-arm64
      runner: macos-latest
      rust-target: aarch64-apple-darwin
      node-platform: darwin
      node-arch: arm64

  macos-x64:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (inputs.platform == 'all' || inputs.platform == 'macos-x64')) ||
      (github.event_name == 'pull_request' &&
        (github.event.label.name == 'build:macos-x64' || github.event.label.name == 'build:all'))
    uses: ./.github/workflows/rc-build-platform.yml
    with:
      platform: macos-x64
      runner: macos-13
      rust-target: x86_64-apple-darwin
      node-platform: darwin
      node-arch: x64

  windows-x64:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (inputs.platform == 'all' || inputs.platform == 'windows-x64')) ||
      (github.event_name == 'pull_request' &&
        (github.event.label.name == 'build:windows-x64' || github.event.label.name == 'build:all'))
    uses: ./.github/workflows/rc-build-platform.yml
    with:
      platform: windows-x64
      runner: windows-latest
      rust-target: x86_64-pc-windows-msvc
      node-platform: win32
      node-arch: x64

  linux-x64:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (inputs.platform == 'all' || inputs.platform == 'linux-x64')) ||
      (github.event_name == 'pull_request' &&
        (github.event.label.name == 'build:linux-x64' || github.event.label.name == 'build:all'))
    uses: ./.github/workflows/rc-build-platform.yml
    with:
      platform: linux-x64
      runner: ubuntu-22.04
      rust-target: x86_64-unknown-linux-gnu
      node-platform: linux
      node-arch: x64
