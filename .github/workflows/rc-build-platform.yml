name: RC Build (Platform)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      runner:
        required: true
        type: string
      rust-target:
        required: true
        type: string
      node-platform:
        required: true
        type: string
      node-arch:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: contains(inputs.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Bundle server
        run: npm run server:bundle

      - name: Pack server (platform-specific Node.js)
        run: node scripts/pack-server.mjs
        env:
          TARGET_PLATFORM: ${{ inputs.node-platform }}
          TARGET_ARCH: ${{ inputs.node-arch }}

      - name: Build Tauri app
        run: npx tauri build --target ${{ inputs.rust-target }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (macOS)
        if: contains(inputs.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: |
            src-tauri/target/${{ inputs.rust-target }}/release/bundle/dmg/*.dmg
          retention-days: 14

      - name: Upload artifacts (Windows)
        if: inputs.platform == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: |
            src-tauri/target/${{ inputs.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ inputs.rust-target }}/release/bundle/msi/*.msi
          retention-days: 14

      - name: Upload artifacts (Linux)
        if: inputs.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: |
            src-tauri/target/${{ inputs.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ inputs.rust-target }}/release/bundle/appimage/*.AppImage
          retention-days: 14
