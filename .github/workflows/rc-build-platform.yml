name: RC Build (Platform)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      runner:
        required: true
        type: string
      rust-target:
        required: true
        type: string
      node-platform:
        required: true
        type: string
      node-arch:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: contains(inputs.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app (macOS / Linux)
        if: inputs.platform != 'windows-x64'
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npx tauri build --target ${{ inputs.rust-target }}

      - name: Build Tauri app (Windows)
        if: inputs.platform == 'windows-x64'
        shell: bash
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          # WiX requires numeric-only version components (e.g. 0.3.0.1 for 0.3.0-rc.1)
          WIX_VERSION=$(node -e "
            const v = '$VERSION';
            const m = v.match(/^(\d+\.\d+\.\d+)-[a-zA-Z]+\.(\d+)$/);
            console.log(m ? m[1] + '.' + m[2] : v.replace(/-.*$/, '') + '.0');
          ")
          npx tauri build --target ${{ inputs.rust-target }} --config "{\"bundle\":{\"windows\":{\"wix\":{\"version\":\"$WIX_VERSION\"}}}}"

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (macOS)
        if: contains(inputs.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: target/${{ inputs.rust-target }}/release/bundle/dmg/*.dmg
          retention-days: 14

      - name: Upload artifacts (Windows)
        if: inputs.platform == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: |
            target/${{ inputs.rust-target }}/release/bundle/nsis/*.exe
            target/${{ inputs.rust-target }}/release/bundle/msi/*.msi
          retention-days: 14

      - name: Upload artifacts (Linux)
        if: inputs.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: KlustrEye-${{ steps.version.outputs.version }}-rc-${{ inputs.platform }}
          path: |
            target/${{ inputs.rust-target }}/release/bundle/deb/*.deb
            target/${{ inputs.rust-target }}/release/bundle/appimage/*.AppImage
          retention-days: 14
